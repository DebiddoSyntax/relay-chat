services:
  - type: web
    name: relaychat-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT core.asgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SECRETKEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: relaychat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: relaychat-redis
          property: connectionString

  - type: redis
    name: relaychat-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  - name: relaychat-db
    plan: free